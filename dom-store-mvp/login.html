<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Conquiste seu iPhone dos sonhos com pagamentos flexíveis via Pix - DOM STORE FACILITA">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FEDB19">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DOM STORE FACILITA">

    <!-- Manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/logo-dom-store-v1.png">
    <link rel="apple-touch-icon" href="./assets/logo-dom-store-v1.png">

    <title>Login - DOM STORE FACILITA</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/logo.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <span class="logo-dom">DOM</span><span class="logo-store">Store</span>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Entrar</h1>
                <p class="auth-subtitle">Acesse sua conta DOM STORE FACILITA</p>
            </div>

            <form id="form-login" class="auth-form">
                <div class="input-group">
                    <label for="email" class="input-label">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="input"
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="senha" class="input-label">Senha</label>
                    <div class="password-input">
                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            class="input"
                            placeholder="••••••••"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('senha')">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M10 7C8.34315 7 7 8.34315 7 10C7 11.6569 8.34315 13 10 13C11.6569 13 13 11.6569 13 10C13 8.34315 11.6569 7 10 7Z" stroke="#666" stroke-width="1.5"/>
                                <path d="M10 3C5.58172 3 2 10 2 10C2 10 5.58172 17 10 17C14.4183 17 18 10 18 10C18 10 14.4183 3 10 3Z" stroke="#666" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large" id="btn-login">
                    Entrar
                </button>

                <p class="auth-footer-text">
                    Não tem uma conta? <a href="criar-conta.html" class="auth-link">Criar conta</a>
                </p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/pwa-register.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
